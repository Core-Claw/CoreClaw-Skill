<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">CoreClaw Agent Skill</title>
  <desc id="desc">An MCP-first, v2-only AI-agent skill for the CoreClaw worker workflow.</desc>
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#F7F2E8" stroke-opacity=".055"/>
    </pattern>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#74E0C1"/><stop offset="1" stop-color="#43B9B0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="390" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1200" height="390" rx="32" fill="#121827"/>
    <rect width="1200" height="390" rx="32" fill="url(#grid)"/>
    <circle cx="1107" cy="56" r="112" fill="#FF7458" fill-opacity=".08"/>
    <circle cx="1048" cy="340" r="138" fill="#63D3BE" fill-opacity=".06"/>

    <g transform="translate(68 48)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <text x="0" y="16" fill="#A9B1C2" font-size="17" font-weight="700" letter-spacing="3">AGENT SKILL · MCP-FIRST · V2-ONLY</text>
      <rect x="0" y="34" width="56" height="6" rx="3" fill="#FF7458"/>
      <text x="0" y="132" fill="#F7F2E8" font-size="74" font-weight="780" letter-spacing="-3">coreclaw</text>
      <text x="0" y="206" fill="#F7F2E8" font-size="66" font-weight="760" letter-spacing="-3">agent skill</text>
      <rect id="title-highlight" x="0" y="224" width="310" height="18" rx="4" fill="#63D3BE" fill-opacity=".82"/>
      <text x="0" y="278" fill="#D6DCE7" font-size="26" font-weight="520">Discover, run, export — by natural language.</text>
      <text x="0" y="322" fill="#7F8A9F" font-size="15" font-weight="650" letter-spacing="1.7">CLAUDE CODE PLUGIN · MCP · REST FALLBACK</text>
    </g>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <g transform="translate(800 50) rotate(5 148 78)">
        <rect x="8" y="10" width="296" height="156" rx="20" fill="#080D17" fill-opacity=".38"/>
        <rect width="296" height="156" rx="20" fill="#F7F2E8"/>
        <circle cx="26" cy="28" r="8" fill="#63D3BE"/>
        <text x="44" y="33" fill="#A9B1C2" font-size="12" font-weight="700">AGENT</text>
        <rect x="22" y="48" width="252" height="42" rx="12" fill="#182334"/>
        <text x="34" y="74" fill="#F7F2E8" font-size="12" font-weight="600">“Use $coreclaw to find a coffee-shop</text>
        <text x="34" y="90" fill="#F7F2E8" font-size="12" font-weight="600">worker, inspect its schema, run it.”</text>
        <rect x="22" y="100" width="252" height="34" rx="12" fill="url(#mint)"/>
        <text x="34" y="122" fill="#10313A" font-size="12" font-weight="700">skill SKILL.md → procedure</text>
      </g>
      <g transform="translate(712 200) rotate(-6 150 72)">
        <rect x="8" y="10" width="300" height="144" rx="18" fill="#080D17" fill-opacity=".4"/>
        <rect width="300" height="144" rx="18" fill="#6A62D9"/>
        <text x="22" y="38" fill="#F7F2E8" font-size="15" font-weight="760">MCP · 34 TOOLS</text>
        <text x="22" y="62" fill="#F7F2E8" fill-opacity=".75" font-size="12">mcp.coreclaw.com/mcp</text>
        <g transform="translate(22 76)" font-size="11" font-weight="700">
          <rect width="84" height="24" rx="7" fill="#F7F2E8" fill-opacity=".16"/><text x="11" y="16" fill="#F7F2E8">discover</text>
          <rect x="96" width="84" height="24" rx="7" fill="#F7F2E8" fill-opacity=".16"/><text x="107" y="16" fill="#F7F2E8">run</text>
          <rect x="192" width="84" height="24" rx="7" fill="#F7F2E8" fill-opacity=".16"/><text x="203" y="16" fill="#F7F2E8">export</text>
        </g>
        <text x="22" y="124" fill="#F7F2E8" fill-opacity=".7" font-size="11">→ results · logs · quota</text>
      </g>
      <g transform="translate(920 250) rotate(7 120 58)">
        <rect x="7" y="9" width="240" height="116" rx="16" fill="#080D17" fill-opacity=".4"/>
        <rect width="240" height="116" rx="16" fill="url(#mint)"/>
        <text x="18" y="36" fill="#10313A" font-size="14" font-weight="760">REST FALLBACK</text>
        <text x="18" y="58" fill="#10313A" font-size="11" font-weight="600">openapi.coreclaw.com</text>
        <rect x="18" y="70" width="204" height="26" rx="8" fill="#10313A" fill-opacity=".12"/>
        <text x="28" y="87" fill="#10313A" font-size="11" font-weight="700">CORECLAW_API_KEY=…</text>
      </g>
    </g>
  </g>
</svg>
